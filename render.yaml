services:
  - type: web
    name: collabx
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn collabx_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: collabx_project.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
        placeholder: "Enter Neon PostgreSQL connection string"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
        placeholder: "Enter Cloudinary cloud name"
      - key: CLOUDINARY_API_KEY
        sync: false
        placeholder: "Enter Cloudinary API key"
      - key: CLOUDINARY_API_SECRET
        sync: false
        placeholder: "Enter Cloudinary API secret key"
      - key: DJANGO_SECRET_KEY
        generateValue: true
