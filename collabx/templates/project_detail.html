{% extends 'base.html' %}
{% load static %}

{% block title %}Project Details - CollabX{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/feed.css' %}">
<style>
  .project-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
    padding: 32px 0;
    align-items: start;
  }
  
  .project-header-section {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .status-tag {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: var(--radius-round);
    display: inline-block;
  }
  .status-open { background: rgba(16, 185, 129, 0.1); color: var(--status-success); }
  .status-progress { background: rgba(245, 158, 11, 0.1); color: var(--status-warning); }
  .status-completed { background: rgba(79, 70, 229, 0.1); color: var(--primary-indigo); }

  /* Team members grid list */
  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }
  
  .member-card-small {
    background: var(--bg-main);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 16px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: all var(--transition-fast);
  }
  .member-card-small:hover {
    transform: translateY(-2px);
    border-color: rgba(79, 70, 229, 0.15);
  }
  
  .member-avatar-small {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-round);
    object-fit: cover;
    margin-bottom: 8px;
    border: 1.5px solid #ffffff;
  }
  
  .member-name-small {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }

  .member-role-small {
    font-size: 10.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  /* Right Side Widget panels */
  .side-panel-title {
    font-size: 16px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-light);
  }

  .request-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px;
    background: var(--bg-main);
    border-radius: var(--radius-md);
    border: 1px solid var(--border-light);
    margin-bottom: 12px;
  }

  .request-header {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .request-msg {
    font-size: 12.5px;
    color: var(--text-muted);
    background: #ffffff;
    padding: 8px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(0, 0, 0, 0.03);
    word-break: break-word;
  }

  .request-actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  
  .status-badge-static {
    font-weight: 700;
    font-size: 13px;
    padding: 10px;
    border-radius: var(--radius-md);
    text-align: center;
    width: 100%;
    display: block;
  }

  @media (max-width: 768px) {
    .project-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="container">
  <div class="project-grid">
    
    <!-- LEFT COLUMN: Project Information -->
    <section class="feed-main-content">
      <!-- Main Details Card -->
      <div class="card" style="margin-bottom: 24px;">
        <div class="project-header-section">
          <div>
            <span class="status-tag" id="status-tag-lbl"></span>
            <h1 class="post-title" id="project-title-lbl" style="font-size: 26px; line-height: 1.25; margin-top: 8px; margin-bottom: 8px;"></h1>
            <div class="post-time-meta">
              <span>Created by <a href="" id="creator-profile-link" style="font-weight: 600; color: var(--primary-indigo);"></a></span>
              <span>&bull;</span>
              <span id="project-date-lbl"></span>
            </div>
          </div>
          
          <button class="btn btn-secondary btn-sm" id="btn-edit-project" style="display: none;">Edit Project</button>
        </div>
        
        <p class="post-desc" id="project-desc-lbl" style="font-size: 15px; line-height: 1.6; margin-bottom: 24px;"></p>
        
        <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 8px;">Required Skills</h4>
        <div class="post-skills-section" id="project-skills-container" style="margin-bottom: 0;">
          <!-- JS-injected required skills -->
        </div>
      </div>
      
      <!-- Team Members Section -->
      <div class="card">
        <h3 style="font-size: 18px; font-weight: 700; border-bottom: 1px solid var(--border-light); padding-bottom: 8px;">
          Team Members (<span id="members-count-lbl">0</span> / <span id="max-size-lbl">0</span>)
        </h3>
        
        <div class="members-grid" id="project-members-container">
          <!-- JS-injected small profile cards -->
        </div>
      </div>
    </section>
    
    <!-- RIGHT COLUMN: Actions / Applications Panel -->
    <aside class="feed-sidebar">
      
      <!-- Join Request Actions widget -->
      <div class="card" id="project-actions-panel">
        <h3 class="side-panel-title" id="actions-panel-title">Applications</h3>
        
        <div id="actions-panel-content">
          <!-- JS-injected request details / forms -->
          <p style="font-size: 13px; color: var(--text-light); text-align: center;">Loading details...</p>
        </div>
      </div>
      
    </aside>
    
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const PROJECT_ID = "{{ project.id }}";
</script>
<script src="{% static 'js/project-detail.js' %}"></script>
{% endblock %}
